[gcode_macro TEST_PA_HARDWARE]
description: Аппаратная калибровка PA через ADS131M02 и CNCKitchen
gcode:
    # === НАСТРОЙКИ (Можно менять при вызове макроса) ===
    {% set TEMP = params.TEMP|default(215)|float %}
    {% set START_K = params.START_K|default(0.0)|float %}
    {% set END_K = params.END_K|default(0.1)|float %}
    {% set STEP_K = params.STEP_K|default(0.005)|float %}
    
    {% set CYCLES = params.CYCLES|default(14)|int %}
    {% set SLOW_FEED = params.SLOW_FEED|default(0.8)|float %}
    {% set FAST_FEED = params.FAST_FEED|default(8.0)|float %}
    {% set SLOW_HALF = params.SLOW_HALF_S|default(1.0)|float %}
    {% set FAST_HALF = params.FAST_HALF_S|default(0.25)|float %}
    
    {% set ACCEL = params.ACCEL|default(5000)|float %}
    {% set Z_MARKER = params.Z_MARKER_MM|default(2.0)|float %}
    {% set WOBBLE_X = params.WOBBLE_X_MM|default(0.05)|float %}
    
    # Координаты безопасной парковки (для сброса пластика в воздухе)
    {% set X_BASE = 30.0 %}
    {% set Y_BASE = 30.0 %}
    {% set Z_BASE = 50.0 %}

    # === ПРЕДРАСЧЕТ МАТЕМАТИКИ ===
    # Объемы выдавливания для каждой фазы
    {% set SLOW_E = SLOW_FEED * SLOW_HALF %}
    {% set FAST_E = FAST_FEED * FAST_HALF %}
    
    # Скорости для синхронных движений (XYZ + E)
    # В Klipper скорость F считается по перемещению осей (XYZ).
    # Чтобы соблюсти тайминги, вычисляем: F = (длина_движения / время) * 60
    {% set SLOW_F_XYZ = (WOBBLE_X / SLOW_HALF) * 60 %}
    {% set FAST_F_XYZ = (WOBBLE_X / FAST_HALF) * 60 %}

    # === ЗАПУСК ===
    SAVE_GCODE_STATE NAME=pa_test_state
    
    G90 ; Абсолютные координаты для осей
    G28 ; Домой
    G1 X{X_BASE} Y{Y_BASE} Z{Z_BASE} F6000 ; Едем в зону сброса
    M109 S{TEMP} ; Греем сопло и ждем
    
    M83 ; Относительная экструзия (для удобства циклов)
    SET_VELOCITY_LIMIT ACCEL={ACCEL} ; Жесткие ускорения для "удара"
    
    # Включаем наш Python-модуль на высокочастотную запись в RAM
    START_PA_RECORDING
    
    # Z-Маркер (Резкий скачок по Z. Скрипт найдет его и возьмет за T=0)
    G1 Z{Z_BASE + Z_MARKER} F1800
    G4 P100
    G1 Z{Z_BASE} F1800
    G4 P500 ; Ждем стабилизации (Pre-roll dwell)
    
    # === ГЛАВНЫЙ ЦИКЛ ПЕРЕБОРА K ===
    {% set steps = ((END_K - START_K) / STEP_K)|round|int %}
    {% for i in range(steps + 1) %}
        {% set CURRENT_K = START_K + (i * STEP_K) %}
        
        # Устанавливаем текущий PA
        SET_PRESSURE_ADVANCE ADVANCE={CURRENT_K}
        M118 Анализируем K = {CURRENT_K}
        
        # Микро-циклы экструзии внутри одного значения K
        {% for c in range(CYCLES) %}
            # Медленная фаза (рост давления) + микро-сдвиг по X
            G1 X{X_BASE + WOBBLE_X} E{SLOW_E} F{SLOW_F_XYZ}
            
            # Быстрая фаза ("удар" давления) + возврат по X
            G1 X{X_BASE} E{FAST_E} F{FAST_F_XYZ}
        {% endfor %}
        
    {% endfor %}
    
    # Завершающий медленный хвост, чтобы закрыть последний график красиво
    G1 X{X_BASE + WOBBLE_X} E{SLOW_E} F{SLOW_F_XYZ}

# === ФИНАЛ И АНАЛИЗ ===
    STOP_PA_RECORDING TEMP={TEMP} START_K={START_K} END_K={END_K} STEP_K={STEP_K} ACCEL={ACCEL} SLOW_FEED={SLOW_FEED} FAST_FEED={FAST_FEED} SLOW_HALF_S={SLOW_HALF} FAST_HALF_S={FAST_HALF} CYCLES={CYCLES} Z_MARKER_MM={Z_MARKER} WOBBLE_X_MM={WOBBLE_X}
    
    # Просто выключаем нагрев и восстанавливаем координаты
    M104 S0
    RESTORE_GCODE_STATE NAME=pa_test_state
